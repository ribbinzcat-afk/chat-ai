<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Chat Studio</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                    </svg>
                    <span>AI Chat Studio</span>
                </div>
                <button id="btn-new-chat" class="btn-icon" title="สร้างแชทใหม่">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                </button>
            </div>

            <div class="sidebar-search">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <input type="text" id="search-chats" placeholder="ค้นหาแชท...">
            </div>

            <div class="chat-list" id="chat-list">
                <!-- Chat items populated by JS -->
            </div>

            <div class="sidebar-footer">
                <button id="btn-settings" class="btn-sidebar-footer">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                    </svg>
                    <span>ตั้งค่า API</span>
                </button>
                <button id="btn-personas" class="btn-sidebar-footer">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    <span>ตัวละคร</span>
                </button>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main id="main-chat" class="main-chat">
            <!-- Chat Header -->
            <header class="chat-header">
                <button id="btn-toggle-sidebar" class="btn-icon mobile-only">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
                    </svg>
                </button>
                <div class="chat-header-info">
                    <div class="chat-avatar" id="chat-avatar">AI</div>
                    <div class="chat-header-text">
                        <h2 id="chat-title">เริ่มต้นสนทนา</h2>
                        <span class="chat-status" id="chat-status">เลือก API เพื่อเริ่มต้น</span>
                    </div>
                </div>
                <div class="chat-header-actions">
                    <select id="model-selector" class="model-selector">
                        <option value="">-- เลือก API --</option>
                    </select>
                    <button id="btn-chat-settings" class="btn-icon" title="ตั้งค่าแชท">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/>
                        </svg>
                    </button>
                </div>
            </header>

            <!-- Welcome Screen -->
            <div id="welcome-screen" class="welcome-screen">
                <div class="welcome-content">
                    <div class="welcome-icon">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                        </svg>
                    </div>
                    <h1>AI Chat Studio</h1>
                    <p>เริ่มต้นสนทนากับ AI ของคุณ</p>
                    <div class="welcome-actions">
                        <button class="btn-welcome" onclick="document.getElementById('btn-settings').click()">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                            </svg>
                            ตั้งค่า API ก่อนเริ่มใช้งาน
                        </button>
                    </div>
                </div>
            </div>

            <!-- Messages Container -->
            <div class="messages-container" id="messages-container">
                <div class="messages-wrapper" id="messages-wrapper">
                    <!-- Messages populated by JS -->
                </div>
            </div>

            <!-- Typing Indicator -->
            <div class="typing-indicator" id="typing-indicator" style="display:none">
                <div class="typing-avatar">AI</div>
                <div class="typing-dots">
                    <span></span><span></span><span></span>
                </div>
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <div class="input-wrapper">
                    <button id="btn-attach" class="btn-icon input-btn" title="แนบไฟล์">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                        </svg>
                    </button>
                    <div class="textarea-container">
                        <textarea id="message-input" placeholder="พิมพ์ข้อความ..." rows="1"></textarea>
                    </div>
                    <button id="btn-send" class="btn-send" title="ส่งข้อความ">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
                        </svg>
                    </button>
                </div>
                <div class="input-footer">
                    <span id="char-count">0</span> ตัวอักษร
                </div>
            </div>
        </main>
    </div>

    <!-- Settings Modal -->
    <div id="modal-settings" class="modal">
        <div class="modal-overlay"></div>
        <div class="modal-content modal-lg">
            <div class="modal-header">
                <h3>ตั้งค่า API</h3>
                <button class="btn-icon modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="settings-tabs">
                    <button class="tab-btn active" data-tab="providers">ผู้ให้บริการ API</button>
                    <button class="tab-btn" data-tab="add-provider">เพิ่ม API ใหม่</button>
                    <button class="tab-btn" data-tab="general">ทั่วไป</button>
                </div>

                <!-- Providers List Tab -->
                <div class="tab-content active" id="tab-providers">
                    <div class="providers-list" id="providers-list">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <!-- Add Provider Tab -->
                <div class="tab-content" id="tab-add-provider">
                    <form id="form-add-provider">
                        <div class="form-group">
                            <label>ประเภท API</label>
                            <select id="provider-type" required>
                                <option value="">-- เลือก --</option>
                                <option value="openai">OpenAI (GPT)</option>
                                <option value="anthropic">Anthropic (Claude)</option>
                                <option value="google">Google (Gemini)</option>
                                <option value="openrouter">OpenRouter</option>
                                <option value="ollama">Ollama (Local)</option>
                                <option value="custom">Custom / Reverse Proxy</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>ชื่อ (ตั้งเอง)</label>
                            <input type="text" id="provider-name" placeholder="เช่น My GPT-4" required>
                        </div>
                        <div class="form-group" id="group-api-url" style="display:none">
                            <label>API URL (Endpoint)</label>
                            <input type="url" id="provider-url" placeholder="https://your-api-endpoint.com/v1">
                        </div>
                        <div class="form-group" id="group-api-key">
                            <label>API Key</label>
                            <div class="input-with-toggle">
                                <input type="password" id="provider-key" placeholder="sk-...">
                                <button type="button" class="btn-toggle-pw" onclick="togglePassword('provider-key')">👁</button>
                            </div>
                        </div>
                        <div class="form-group" id="group-model-id">
                            <label>Model ID</label>
                            <input type="text" id="provider-model" placeholder="เช่น gpt-4o, claude-3-opus-20240229">
                        </div>
                        <div class="form-group">
                            <label>System Prompt (เริ่มต้น)</label>
                            <textarea id="provider-system-prompt" rows="3" placeholder="คุณคือผู้ช่วย AI ที่เป็นมิตร..."></textarea>
                        </div>

                        <!-- Advanced Settings -->
                        <details class="advanced-settings">
                            <summary>ตั้งค่าขั้นสูง</summary>
                            <div class="form-group">
                                <label>Temperature <span id="temp-value">0.7</span></label>
                                <input type="range" id="provider-temp" min="0" max="2" step="0.1" value="0.7"
                                       oninput="document.getElementById('temp-value').textContent=this.value">
                            </div>
                            <div class="form-group">
                                <label>Max Tokens</label>
                                <input type="number" id="provider-max-tokens" value="4096" min="1" max="128000">
                            </div>
                            <div class="form-group">
                                <label>Top P <span id="topp-value">1.0</span></label>
                                <input type="range" id="provider-top-p" min="0" max="1" step="0.05" value="1"
                                       oninput="document.getElementById('topp-value').textContent=this.value">
                            </div>
                            <div class="form-group">
                                <label>Frequency Penalty <span id="freq-value">0</span></label>
                                <input type="range" id="provider-freq-penalty" min="0" max="2" step="0.1" value="0"
                                       oninput="document.getElementById('freq-value').textContent=this.value">
                            </div>
                            <div class="form-group">
                                <label>Custom Headers (JSON)</label>
                                <textarea id="provider-headers" rows="2" placeholder='{"X-Custom-Header": "value"}'></textarea>
                            </div>
                        </details>

                        <button type="submit" class="btn-primary btn-full">บันทึก API</button>
                    </form>
                </div>

                <!-- General Settings Tab -->
                <div class="tab-content" id="tab-general">
                    <div class="form-group">
                        <label>ธีม</label>
                        <select id="setting-theme">
                            <option value="light">สว่าง</option>
                            <option value="dark">มืด</option>
                            <option value="auto">อัตโนมัติ</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>ขนาดตัวอักษร</label>
                        <select id="setting-fontsize">
                            <option value="small">เล็ก</option>
                            <option value="medium" selected>กลาง</option>
                            <option value="large">ใหญ่</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>ส่งด้วย Enter</label>
                        <select id="setting-enter-send">
                            <option value="true" selected>Enter = ส่ง, Shift+Enter = ขึ้นบรรทัดใหม่</option>
                            <option value="false">Enter = ขึ้นบรรทัดใหม่, Ctrl+Enter = ส่ง</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Streaming (แสดงข้อความทีละตัว)</label>
                        <select id="setting-streaming">
                            <option value="true" selected>เปิด</option>
                            <option value="false">ปิด</option>
                        </select>
                    </div>
                    <hr>
                    <button class="btn-danger btn-full" id="btn-clear-all-data">ลบข้อมูลทั้งหมด</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Persona Modal -->
    <div id="modal-persona" class="modal">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3>จัดการตัวละคร</h3>
                <button class="btn-icon modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <form id="form-persona">
                    <div class="form-group">
                        <label>ชื่อตัวละคร</label>
                        <input type="text" id="persona-name" placeholder="เช่น ผู้ช่วยวิจัย" required>
                    </div>
                    <div class="form-group">
                        <label>อวาตาร์ (Emoji/ตัวอักษร)</label>
                        <input type="text" id="persona-avatar" placeholder="🤖" maxlength="2">
                    </div>
                    <div class="form-group">
                        <label>System Prompt</label>
                        <textarea id="persona-prompt" rows="5" placeholder="อธิบายบุคลิกและพฤติกรรมของตัวละคร..." required></textarea>
                    </div>
                    <button type="submit" class="btn-primary btn-full">บันทึกตัวละคร</button>
                </form>
                <hr>
                <div class="personas-list" id="personas-list">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- Chat Settings Modal -->
    <div id="modal-chat-settings" class="modal">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3>ตั้งค่าแชทนี้</h3>
                <button class="btn-icon modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>ชื่อแชท</label>
                    <input type="text" id="edit-chat-title">
                </div>
                <div class="form-group">
                    <label>ตัวละคร</label>
                    <select id="edit-chat-persona">
                        <option value="">-- ไม่ใช้ --</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>System Prompt (เฉพาะแชทนี้)</label>
                    <textarea id="edit-chat-system" rows="4"></textarea>
                </div>
                <button class="btn-primary btn-full" id="btn-save-chat-settings">บันทึก</button>
                <hr>
                <button class="btn-danger btn-full" id="btn-delete-chat">ลบแชทนี้</button>
                <button class="btn-secondary btn-full" id="btn-export-chat" style="margin-top:8px">ส่งออกแชท (JSON)</button>
            </div>
        </div>
    </div>

    <!-- Context Menu for Messages -->
    <div id="msg-context-menu" class="context-menu" style="display:none">
        <button data-action="edit">✏️ แก้ไข</button>
        <button data-action="copy">📋 คัดลอก</button>
        <button data-action="regenerate">🔄 สร้างใหม่</button>
        <button data-action="delete">🗑️ ลบ</button>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/api-manager.js"></script>
    <script src="js/chat-engine.js"></script>
    <script src="js/ui-controller.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
